<!-- Rules Modal -->
<div id="rules-modal" class="modal-overlay">
  <div class="modal-box">
    <p id="rules-title">📖 Πώς να παίξεις</p>
    <ul class="rules-list">
      <li>Μάντεψε τη λέξη σε <strong>6 προσπάθειες</strong>.</li>
      <li>Κάθε λέξη έχει <strong>5 γράμματα</strong>.</li>
      <li><span class="color-dot dot-green"></span> Σωστό γράμμα, <strong>σωστή</strong> θέση</li>
      <li><span class="color-dot dot-amber"></span> Σωστό γράμμα, <strong>λάθος</strong> θέση</li>
      <li><span class="color-dot dot-grey"></span> Γράμμα που <strong>δεν υπάρχει</strong></li>
    </ul>
    <button id="rules-btn" onclick="closeRulesModal()">Ας παίξουμε!</button>
  </div>
</div>

<!-- Game Over Modal -->
<div id="game-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <p id="modal-title"></p>
    <p id="modal-word"></p>
    <button id="modal-btn" onclick="restartGame()">Νέο Παιχνίδι</button>
